services:
  # ── Django Web Service ────────────────────────────────────────────────────
  - type: web
    name: hiremind-backend
    env: python
    region: singapore   # closest to India
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT backend.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure secret
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: hiremind-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: hiremind-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false                # You'll paste this in the Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false                # Set to your Vercel URL after deploying frontend

  # ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: hiremind-db
    databaseName: hiremind
    plan: free
    region: singapore
